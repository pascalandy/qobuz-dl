name: Release

# Tag-triggered release: push a tag like v1.0.0. The build job runs
# read-only quality gates and uploads artifacts; the publish job gets the
# minimal write token needed to create the GitHub release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Quality gates
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run pytest

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(uv run python -c 'from importlib.metadata import version; print(version("qobuz-dl"))')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: qobuz-dl-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: qobuz-dl-dist
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
